apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-forgeai-config
  labels:
    app: forgeai
    release: {{ .Release.Name }}
data:
  model-name: "{{ .Values.model.name }}"
  server-host: "{{ .Values.server.host }}"
  server-port: "{{ .Values.server.port | toString }}"
  gpu-tensor-parallel: "{{ .Values.gpu.tensorParallelSize | toString }}"
  gpu-memory-utilization: "{{ .Values.gpu.memoryUtilization | toString }}"
  telemetry-enabled: "{{ .Values.telemetry.enabled }}"
  auth-enabled: "{{ .Values.auth.enabled }}"
