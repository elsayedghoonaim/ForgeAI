apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgeai
  labels:
    app: forgeai
    version: "1.1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgeai
  template:
    metadata:
      labels:
        app: forgeai
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: forgeai
          image: forgeai:latest
          command: ["forgeai", "serve"]
          args: ["--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: forgeai_MODEL_NAME
              value: "Qwen/Qwen2.5-7B-Instruct"
            - name: forgeai_TELEMETRY_ENABLED
              value: "false"
            - name: HF_HOME
              value: "/models"
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: model-cache
              mountPath: /models
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: forgeai
  labels:
    app: forgeai
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: forgeai
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-model-cache
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
